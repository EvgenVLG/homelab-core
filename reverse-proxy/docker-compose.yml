services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
    networks:
      - proxy
      - homelab
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  proxy:
    external: true
  homelab:
    external: true
