services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    networks:
      - homelab
    labels:
      caddy: portainer.home.arpa
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 9000}}"

networks:
  homelab:
    external: true
