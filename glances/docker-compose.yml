services:
  glances:
    image: nicolargo/glances:latest
    container_name: glances
    restart: unless-stopped
    pid: host
    environment:
      - GLANCES_OPT=-w
      - TZ=America/New_York
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - homelab
    labels:
      caddy: glances.home.arpa
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 61208}}"

networks:
  homelab:
    external: true
