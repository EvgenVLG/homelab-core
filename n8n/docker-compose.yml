services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    volumes:
      - ./data:/home/node/.n8n
    networks:
      - homelab
    labels:
      caddy: n8n.home.arpa
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 5678}}"

networks:
  homelab:
    external: true
