
services:
  adguard:
    image: adguard/adguardhome:v0.107.58
    container_name: adguard
    restart: unless-stopped
    networks:
      - proxy
      - homelab
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3001:3000/tcp"
    volumes:
      - ./work:/opt/adguardhome/work
      - ./conf:/opt/adguardhome/conf

networks:
  proxy:
    external: true
  homelab:
    external: true
