services:
  adguard:
    image: adguard/adguardhome:v0.107.58
    container_name: adguard
    restart: unless-stopped
    networks:
      - homelab
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3001:3000/tcp"
    volumes:
      - ./work:/opt/adguardhome/work
      - ./conf:/opt/adguardhome/conf
    labels:
      caddy: adguard.home.arpa
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 3000}}"

networks:
  homelab:
    external: true
