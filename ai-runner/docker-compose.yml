services:
  ai-runner:
    build: .
    container_name: ai-runner
    restart: unless-stopped
    environment:
      - RUNNER_MODE=plan
      - RUNNER_LOG_DIR=/app/logs
      - TZ=America/New_York
    volumes:
      - ./logs:/app/logs
      - /srv/docker:/workspace/homelab-core:ro
      - /srv/docker/house-bot:/workspace/house-bot:ro
      - /srv/docker/music-assistant:/workspace/music-assistant:ro
      - ./generic:/workspace/generic:ro
    networks:
      - homelab
    labels:
      caddy: ai-runner.home.arpa
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 8081}}"

networks:
  homelab:
    external: true
