- resources:
    cpu: true
    memory: true
    disk:
      - /
      - /storage

- datetime:
    text_size: xl
    format:
      dateStyle: long
      timeStyle: short

- search:
    provider: duckduckgo
    target: _blank

- docker:
    host: my-docker
    containers:
      - navidrome
      - lidarr
      - prowlarr
      - qbittorrent
      - n8n
      - portainer
      - adguard
      - homeassistant
