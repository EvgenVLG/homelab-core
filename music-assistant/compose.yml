services:
  music-assistant:
    build: .
    container_name: music-assistant
    user: "1000:1000"
    command: ["run-all"]
    restart: "no"
    environment:
      INPUT_DIR: /data/input
      LIBRARY_DIR: /data/library
      OUTPUT_DIR: /data/output
      LOG_LEVEL: INFO
      MATCH_THRESHOLD: "0.6"
      PLAYLIST_SIZE: "30"
      REDISCOVERY_DAYS: "90"
    volumes:
      - /srv/docker/music-assistant/data/input:/data/input:ro
      - /storage/media/music:/data/library:ro
      - /srv/docker/music-assistant/data/output:/data/output
      - /srv/docker/music-assistant/data/state:/data/state

  music-assistant-init:
    build: .
    container_name: music-assistant-init
    user: "1000:1000"
    entrypoint: [""]
    command: ["python", "-m", "app.db.init_db"]
    restart: "no"
    environment:
      INPUT_DIR: /data/input
      LIBRARY_DIR: /data/library
      OUTPUT_DIR: /data/output
      LOG_LEVEL: INFO
      MATCH_THRESHOLD: "0.6"
      PLAYLIST_SIZE: "30"
      REDISCOVERY_DAYS: "90"
    volumes:
      - /srv/docker/music-assistant/data/input:/data/input:ro
      - /storage/media/music:/data/library:ro
      - /srv/docker/music-assistant/data/output:/data/output
      - /srv/docker/music-assistant/data/state:/data/state
