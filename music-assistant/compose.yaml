services:
  music-assistant:
    build: .
    image: music-assistant:latest
    container_name: music-assistant
    restart: "no"

    volumes:
      - ./data/input:/data/input:ro
      - /storage/media/music:/data/library:ro
      - ./data/output:/data/output

    environment:
      INPUT_DIR: /data/input
      LIBRARY_DIR: /data/library
      OUTPUT_DIR: /data/output
      PLAYLIST_SIZE: "30"
      MATCH_THRESHOLD: "0.6"
      REDISCOVERY_DAYS: "90"
      LOG_LEVEL: INFO
      # AUDIO_EXTENSIONS: .mp3,.flac,.ogg,.m4a,.aac,.opus,.wav,.wma,.aiff

    command: ["run-all"]
